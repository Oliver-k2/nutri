<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>공주지원의 개인비서(💖)</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Sidebar Navigation -->
    <aside class="sidebar">
        <div class="brand">
            💖 공주지원의 개인비서
        </div>
        <ul class="nav-menu">
            <li class="nav-item active" onclick="switchTab('dashboard')">📊 메인 대시보드</li>
            <li class="nav-item" onclick="switchTab('mealPlan')">🍱 지능형 식단 관리</li>
            <li class="nav-item" onclick="switchTab('inventory')">📦 발주 및 재고 (준비중)</li>
            <li class="nav-item" onclick="switchTab('hygiene')">🧼 위생/상담 (준비중)</li>
        </ul>
    </aside>

    <!-- Main Content -->
    <main class="main-content">

        <!-- ==============================================
             1. Main Dashboard
             ============================================== -->
        <section id="dashboard" class="view-section">
            <header>
                <h1>오늘의 대시보드</h1>
                <p id="today-date"></p>
            </header>

            <div class="dashboard-grid">

                <!-- Today's Menu -->
                <div class="card">
                    <div class="card-header">
                        <span class="card-title">오늘의 식단</span>
                    </div>
                    <ul class="menu-list" id="today-menu-list">
                        <!-- Populated via JS -->
                    </ul>
                    <div class="nutrition-summary" id="today-nutrition">
                        <!-- Populated via JS -->
                    </div>
                </div>

                <!-- Hygiene Checklist & Alerts -->
                <div class="card">
                    <div class="card-header">
                        <span class="card-title">위생 점검 및 알림</span>
                    </div>

                    <div id="alerts-container">
                        <!-- Populated via JS (Pending Orders, Expiry) -->
                    </div>

                    <ul class="checklist" id="hygiene-list">
                        <!-- Populated via JS -->
                    </ul>
                </div>

                <!-- Satisfaction Chart -->
                <div class="card">
                    <div class="card-header">
                        <span class="card-title">주간 식단 만족도 (%)</span>
                    </div>
                    <div class="chart-container" id="satisfaction-chart">
                        <!-- Populated via JS -->
                    </div>
                </div>
            </div>
        </section>


        <!-- ==============================================
             2. Smart Meal Planner
             ============================================== -->
        <section id="mealPlan" class="view-section" style="display:none;">
            <header>
                <h1>지능형 식단 관리</h1>
                <button class="btn btn-primary" onclick="autoGenerateMeals()">✨ AI 자동 생성</button>
            </header>

            <div class="flex-container">
                <!-- Calendar View -->
                <div style="flex: 1;">
                    <table class="calendar-table">
                        <thead>
                            <tr>
                                <th>월</th><th>화</th><th>수</th><th>목</th><th>금</th>
                            </tr>
                        </thead>
                        <tbody id="calendar-body">
                            <!-- Populated via JS -->
                        </tbody>
                    </table>
                </div>

                <!-- Menu Sidebar for Drag & Drop -->
                <aside class="planner-sidebar card">
                    <div class="card-header">
                        <span class="card-title">메뉴 검색</span>
                    </div>
                    <input type="text" class="search-input" id="menu-search" placeholder="메뉴 이름 검색..." onkeyup="filterMenuSearch()">
                    <div id="search-results" style="max-height: 400px; overflow-y: auto;">
                        <!-- Populated via JS -->
                    </div>
                </aside>
            </div>
        </section>


        <!-- Placeholder for other sections -->
        <section id="inventory" class="view-section" style="display:none;">
            <header><h1>발주 및 재고 관리</h1></header>
            <p>기능 개발 진행 중입니다.</p>
        </section>

        <section id="hygiene" class="view-section" style="display:none;">
            <header><h1>위생 및 영양 상담</h1></header>
            <p>기능 개발 진행 중입니다.</p>
        </section>

    </main>

    <!-- Scripts -->
    <script src="data.js"></script>
    <script src="dashboard.js"></script>
    <script src="mealPlan.js"></script>
    <script src="inventory.js"></script>

    <script>
        // Simple Navigation Logic
        function switchTab(tabId) {
            // Hide all sections
            document.querySelectorAll('.view-section').forEach(sec => sec.style.display = 'none');
            // Show target section
            document.getElementById(tabId).style.display = 'block';

            // Update Active Nav
            document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
            event.currentTarget.classList.add('active');

            // Re-render specifics if needed
            if(tabId === 'mealPlan') {
                renderCalendar();
                renderSearchMenu();
            }
        }
    </script>
</body>
</html>
