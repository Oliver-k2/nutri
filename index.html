<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 메뉴 제작 도우미</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <!-- SheetJS for Excel/CSV parsing and export -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>
<body>

    <!-- Main Content -->
    <main class="main-content full-width">
        <!-- ==============================================
             Smart Meal Planner (딸깍 식단 작성)
             ============================================== -->
        <section id="mealPlan" class="view-section">
            <header class="app-header">
                <div class="header-title">
                    <h1>딸깍 식단 작성</h1>
                    <span class="subtitle">AI 메뉴 제작 도우미</span>
                </div>
                <div class="header-actions">
                    <button class="btn btn-outline" onclick="downloadTemplate()">📄 양식 다운로드</button>
                    <label class="btn btn-outline" for="csv-upload" style="cursor: pointer; margin-bottom: 0;">
                        📁 CSV 메뉴 업로드
                    </label>
                    <input type="file" id="csv-upload" accept=".csv, .xlsx" style="display: none;" onchange="handleFileUpload(event)">

                    <button class="btn btn-outline" onclick="downloadMealPlan()">💾 식단 다운로드</button>
                    <button class="btn btn-primary" onclick="autoGenerateMeals()">✨ AI 자동 생성</button>
                </div>
            </header>

            <!-- Monthly Calendar View -->
            <div class="calendar-header-controls">
                <button class="btn" onclick="changeMonth(-1)">◀ 이전</button>
                <h2 id="current-month-label">2023년 10월</h2>
                <button class="btn" onclick="changeMonth(1)">다음 ▶</button>
            </div>

            <div class="monthly-calendar-grid" id="monthly-calendar">
                <!-- Rendered via JS -->
            </div>

            <!-- Daily Edit Modal / Panel -->
            <div id="daily-edit-modal" class="modal-overlay" style="display:none;">
                <div class="modal-content">
                    <header class="modal-header">
                        <h2 id="modal-date-label">날짜 식단 편집</h2>
                        <button class="btn-close" onclick="closeEditModal()">✖</button>
                    </header>
                    <div class="flex-container">
                        <!-- Daily slots -->
                        <div class="daily-slots" id="modal-daily-slots">
                            <!-- Populated via JS -->
                        </div>

                        <!-- Search Sidebar -->
                        <aside class="planner-sidebar card">
                            <div class="card-header">
                                <span class="card-title">메뉴 검색</span>
                            </div>
                            <input type="text" class="search-input" id="menu-search" placeholder="메뉴 이름 검색..." onkeyup="filterMenuSearch()">
                            <div id="search-results" style="max-height: 400px; overflow-y: auto;">
                                <!-- Populated via JS -->
                            </div>
                        </aside>
                    </div>
                </div>
            </div>
        </section>


    </main>

    <!-- Scripts -->
    <script src="data.js"></script>
    <script src="mealPlan.js"></script>
    <script src="excel.js"></script>
</body>
</html>
